<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Oil Jicko — Manufacturing Cost Ledger</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2216%22 fill=%22%231C1E1F%22/><path d=%22M50 20c8 14-6 16-6 28a12 12 0 0024 0c0-8-4-10-6-16 2 10-4 12-4 6 0-6 4-8-8-18z%22 fill=%22%23E2621B%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand-block">
      <label class="logo-slot" id="logoSlot" title="Click to add your organisation logo" tabindex="0" role="button" aria-label="Add organisation logo">
        <input type="file" id="logoInput" accept="image/*" hidden>
        <img id="logoImg" alt="Organisation logo" hidden>
        <span id="logoPlaceholder" class="logo-placeholder">
          <svg viewBox="0 0 48 48" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="6" width="36" height="36" rx="4"/>
            <path d="M6 32l10-10 8 8 8-8 10 10" stroke-linejoin="round" stroke-linecap="round"/>
            <circle cx="17" cy="17" r="3"/>
          </svg>
          <span>Add logo</span>
        </span>
      </label>
      <button id="removeLogo" class="ghost-btn" hidden>Remove logo</button>
      <div class="title-block">
        <p class="eyebrow">Workshop Cost Ledger</p>
        <h1>Eco&nbsp;Oil&nbsp;Jicko</h1>
        <p class="tagline">Manufacturing cost breakdown — Compact &amp; Tall designs</p>
      </div>
    </div>
    <div class="header-gauge">
      <svg id="headerGauge" viewBox="0 0 200 120" class="gauge"></svg>
      <div class="gauge-caption">
        <span class="gauge-label">Est. margin</span>
        <span class="gauge-value" id="headerGaugeValue">—</span>
      </div>
    </div>
  </div>
</header>

<div class="controls-bar" id="controlsBar">
  <div class="controls-inner">
    <div class="control">
      <label for="wasteRange">Waste allowance <span id="wasteRangeVal">7.5%</span></label>
      <input type="range" id="wasteRange" min="0" max="15" step="0.5" value="7.5">
    </div>
    <div class="control">
      <label for="blowerSelect">Blower fan</label>
      <select id="blowerSelect">
        <option value="2500">Standard — 2,500 KSh</option>
        <option value="1200">Economy — 1,200 KSh</option>
      </select>
    </div>
    <div class="control">
      <label for="overheadInput">Factory overhead (KSh)</label>
      <input type="number" id="overheadInput" min="0" step="10" value="0">
    </div>
    <div class="control">
      <label for="transportInput">Transport (KSh)</label>
      <input type="number" id="transportInput" min="0" step="10" value="0">
    </div>
    <div class="control">
      <label for="targetInput">Target selling price (KSh)</label>
      <input type="number" id="targetInput" min="0" step="50" value="7000">
    </div>
    <button id="resetBtn" class="ghost-btn small">Reset</button>
  </div>
</div>

<nav class="tabs" id="tabs">
  <button class="tab-btn active" data-tab="summary">Summary</button>
  <button class="tab-btn" data-tab="rates">Material Rates</button>
  <button class="tab-btn" data-tab="compact">Compact BOM</button>
  <button class="tab-btn" data-tab="tallStd">Tall — as labelled</button>
  <button class="tab-btn" data-tab="tallCov">Tall — with covers</button>
</nav>

<main id="app">
  <section id="panel-summary" class="panel active"></section>
  <section id="panel-rates" class="panel"></section>
  <section id="panel-compact" class="panel"></section>
  <section id="panel-tallStd" class="panel"></section>
  <section id="panel-tallCov" class="panel"></section>
</main>

<footer class="site-footer">
  <p>Built for Eco Oil Jicko workshop costing. Figures are estimates — verify supplier prices before quoting. All calculations happen locally in your browser; nothing is sent anywhere.</p>
</footer>

<script src="app.js"></script>
</body>
</html>
